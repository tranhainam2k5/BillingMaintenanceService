services:
  # 1. Backend Web Service (Docker)
  - type: web
    name: billing-maintenance-backend
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Jwt__Key
        value: THIS_IS_A_SECRET_KEY_FOR_BILLING_MAINTENANCE_SERVICE_123456
      - key: Jwt__Issuer
        value: BillingMaintenanceService
      - key: Jwt__Audience
        value: BillingMaintenanceService
      - key: DATABASE_URL
        fromDatabase:
          name: billing-db
          property: connectionString

databases:
  - name: billing-db
    plan: free
    postgresMajorVersion: 16
